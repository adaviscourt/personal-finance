name: Archive Completed OpenSpec Changes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec@latest

      - name: Archive completed OpenSpec changes
        id: archive
        run: node scripts/archive-completed-openspec-changes.js

      - name: Create archive pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/archive-completed-openspec-changes
          delete-branch: true
          title: ${{ steps.archive.outputs.pr_title }}
          commit-message: ${{ steps.archive.outputs.pr_title }}
          body: ${{ steps.archive.outputs.pr_body }}
